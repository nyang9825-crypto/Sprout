    <path d="M 12 11.5 C 14.5 12.5 14.5 20 12 21 C 9.5 20 9.5 12.5 12 11.5 Z" fill="white"/>
    <path d="M 17.5 9 C 20.7 10.2 20.7 19.8 17.5 21 C 14.3 19.8 14.3 10.2 17.5 9 Z" fill="white"/>
  </g>
</svg>
